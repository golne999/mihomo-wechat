name: Update WeChat Rules

on:
  schedule:
    - cron: '0 0 * * *'  # 每天北京时间早8点自动执行
  workflow_dispatch:      # 允许手动点击按钮执行
  push:
    paths:
      - 'convert.py'      # 修改脚本时触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4 # 修正了原配置中的一个小错误
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Conversion Script
        run: python convert.py

      - name: Commit and Push if changed
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Routine Update: WeChat.list" # 更新提交信息
          file_pattern: 'WeChat.list' # 必须改为 .list，或者用 '*.list' 匹配所有
